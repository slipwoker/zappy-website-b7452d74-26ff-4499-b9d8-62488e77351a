# Render static site routing configuration
# Generated: 2026-05-01T14:39:32.487Z
# This file configures URL rewrite rules for SPA routing

# Routes are applied when no static file exists at the requested path
# More specific routes should be listed before catch-all routes

routes:
  - type: rewrite
    source: /product/*
    destination: /product.html
  - type: rewrite
    source: /category/*
    destination: /category.html
  - type: rewrite
    source: /en/product/*
    destination: /en/product.html
  - type: rewrite
    source: /en/category/*
    destination: /en/category.html
  - type: rewrite
    source: /ar/product/*
    destination: /ar/product.html
  - type: rewrite
    source: /ar/category/*
    destination: /ar/category.html
  - type: rewrite
    source: /ru/product/*
    destination: /ru/product.html
  - type: rewrite
    source: /ru/category/*
    destination: /ru/category.html
  - type: rewrite
    source: /fr/product/*
    destination: /fr/product.html
  - type: rewrite
    source: /fr/category/*
    destination: /fr/category.html
